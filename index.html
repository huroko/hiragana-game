<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ひらがなゲーム</title>
    <style>
        /* 5歳の女の子を意識した「ゆめかわ」なデザイン */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fff0f5; /* ラベンダーブラッシュ（薄いピンク） */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* スコア表示 */
        #score-container {
            font-size: 24px;
            color: #ff69b4;
            font-weight: bold;
            margin-bottom: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* ひらがなを表示する大きなカード */
        #card {
            font-size: 120px;
            font-weight: bold;
            color: #ff1493; /* ディープピンク */
            background-color: #ffffff;
            width: 250px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            box-shadow: 0 8px 16px rgba(255, 105, 180, 0.3);
            border: 4px solid #ffb6c1;
            margin-bottom: 4px; /* ボタンとの余白（端に寄せない） */
            transition: transform 0.1s;
        }

        /* イラスト（言葉）の表示 */
        #word-hint {
            font-size: 24px;
            color: #666;
            height: 35px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* 押しやすい大きなボタン */
        #next-btn {
            font-size: 28px;
            font-weight: bold;
            color: white;
            background: linear-gradient(to bottom, #ff92d0, #ff69b4);
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #db4d93;
            transition: all 0.1s;
        }

        /* ボタンを押したときのぷにっとした動き */
        #next-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #db4d93;
        }
    </style>
</head>
<body>

    <div id="score-container">てんすう： <span id="score">0</span> てん</div>

    <div id="card">？</div>
    <div id="word-hint"></div>

    <button id="next-btn" onclick="playGame()">つぎへ</button>

    <script>
        // ① ひらがな、言葉、音声（Web Audio API用）のデータ構造
        const hiraganaList = [
            { char: "あ", word: "あじさい" },
            { char: "い", word: "いちご" },
            { char: "う", word: "うさぎ" },
            { char: "え", word: "えんぴつ" },
            { char: "お", word: "おにぎり" }
            // 必要に応じて「か」以降も同じように追加できます
        ];

        let score = 0;

        // ② 音を鳴らす関数（外部の音声ファイル不要でピピッ、ピコーンと鳴らせます）
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'click') {
                // ボタンを押したときの「ピピッ」という音
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'bonus') {
                // レアが出たときの「ピコピコーン！」という嬉しい音
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // ド
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // ミ
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // ソ
                osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.3); // 高いド
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        // ③ メインのゲーム処理
        function playGame() {
            // ランダムに1つ選ぶ
            const randomIndex = Math.floor(Math.random() * hiraganaList.length);
            const selected = hiraganaList[randomIndex];

            // 画面の書き換え
            const cardElement = document.getElementById("card");
            cardElement.innerText = selected.char;
            document.getElementById("word-hint").innerText = selected.word;

            // 5歳児を飽きさせない「確率の仕掛け」
            // 20%の確率でラッキー文字（ボーナス点）にする
            const isLucky = Math.random() < 0.2; 

            if (isLucky) {
                score += 50; // ボーナス点
                cardElement.style.color = "#ff007f"; // 文字色をより派手に
                cardElement.style.transform = "scale(1.1)"; // カードを少し大きく
                playSound('bonus'); // 豪華な音
                alert(`ラッキー！「${selected.char}」がでたよ！ +50てん！`);
            } else {
                score += 10; // 通常点
                cardElement.style.color = "#ff1493";
                cardElement.style.transform = "scale(1)";
                playSound('click'); // 通常の音
            }

            // 得点の表示を更新
            document.getElementById("score").innerText = score;
        }
    </script>
</body>
</html>
