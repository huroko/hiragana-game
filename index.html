
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ひらがなゲーム</title>
</head>
<body>

<h1>ひらがなゲーム</h1>

<button onclick="showWord()">
スタート
</button>

<p id="word"></p>

<script>
const words = [
  "🦆あひる",
  "🐶 いぬ",
  "🐰 うさぎ",
  "🦐 えび",
  "👹 おに",
  "🐸 かえる",
  "🦊 きつね",
  "🐱 ねこ",
  "🐯 とら",
  "🐻 くま"
];

function showWord() {
  const random =
    words[Math.floor(Math.random() * words.length)];

  document.getElementById("word").textContent =
    random;
}
</script>

</body>
</html>
