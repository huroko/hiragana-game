<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 ひらがなゲーム 🌸</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: linear-gradient(160deg, #fff0f6 0%, #f0f4ff 50%, #f0fff8 100%);
      min-height: 100vh;
      padding: 1.5rem 1rem;
      text-align: center;
    }

    /* ===== タイトル ===== */
    .title {
      font-size: 26px;
      font-weight: 500;
      color: #c06080;
      margin-bottom: 0.2rem;
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 13px;
      color: #b090a8;
      margin-bottom: 1.2rem;
    }

    /* ===== スコアカード3つ ===== */
    .score-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 1.2rem;
    }
    .score-card {
      background: #fff;
      border: 1.5px solid #f5c0d8;
      border-radius: 16px;
      padding: 8px 16px;
      min-width: 88px;
    }
    .score-label { font-size: 11px; color: #c080a0; margin-bottom: 2px; }
    .score-value { font-size: 22px; font-weight: 500; color: #d060a0; }

    /* ===== プログレスバー ===== */
    .progress-bar-wrap {
      max-width: 320px;
      margin: 0 auto 1rem;
      height: 8px;
      background: #fce0ee;
      border-radius: 8px;
      overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, #f9b4d0, #d8a0f0);
      border-radius: 8px;
      transition: width 0.4s ease;
    }

    /* ===== 絵カード ===== */
    .card {
      background: #fff;
      border: 2px solid #f5c0d8;
      border-radius: 24px;
      padding: 1.8rem 1rem;
      margin: 0 auto 1.2rem;
      max-width: 320px;
      min-height: 170px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 2px 12px #f5c0d830;
    }
    .emoji { font-size: 70px; line-height: 1; }
    .hint  { font-size: 13px; color: #c090b0; }

    /* ===== 4択ボタン ===== */
    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 320px;
      margin: 0 auto 1.2rem;
    }
    .choice-btn {
      background: #fff0f6;
      border: 2px solid #f5c0d8;
      border-radius: 16px;
      padding: 14px 8px;
      font-size: 20px;
      cursor: pointer;
      color: #c060a0;
      transition: transform 0.12s, background 0.12s;
      font-family: sans-serif;
    }
    .choice-btn:hover   { background: #ffe0ef; transform: scale(1.05); }
    /* 正解のとき：緑 */
    .choice-btn.correct { background: #e8f8f0; border-color: #7dd8b0; color: #2a7a5a; }
    /* 不正解のとき：赤 */
    .choice-btn.wrong   { background: #fff0f0; border-color: #f0a0a8; color: #a03040; }
    .choice-btn:disabled { cursor: default; transform: none; }

    /* ===== フィードバック文・星 ===== */
    .feedback {
      font-size: 20px;
      font-weight: 500;
      min-height: 32px;
      margin-bottom: 0.5rem;
      color: #c060a0;
    }
    .stars {
      font-size: 20px;
      letter-spacing: 3px;
      min-height: 28px;
      margin-bottom: 0.8rem;
    }

    /* ===== スタートボタン ===== */
    .start-btn {
      background: linear-gradient(135deg, #f9b4d0, #d8a0f0);
      border: none;
      border-radius: 20px;
      padding: 13px 36px;
      font-size: 18px;
      cursor: pointer;
      color: #fff;
      font-weight: 500;
      letter-spacing: 1px;
      box-shadow: 0 3px 10px #f0a0c840;
      transition: transform 0.1s, box-shadow 0.1s;
      font-family: sans-serif;
    }
    .start-btn:hover { transform: scale(1.04); box-shadow: 0 5px 16px #f0a0c860; }

    /* ===== ごほうびシール画面 ===== */
    .result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 0.5rem 0;
    }
    .result-title { font-size: 24px; font-weight: 500; color: #c060a0; }
    .result-score { font-size: 38px; font-weight: 500; color: #d060b0; }
    .result-msg   { font-size: 14px; color: #b090a8; }

    /* シールエリア */
    .sticker-area {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      max-width: 300px;
    }
    /* 1枚ずつポンと出るアニメーション */
    @keyframes pop {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); }
    }
    .sticker {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px #f0c0d840;
      animation: pop 0.4s ease backwards;
    }
    /* シールの背景色（5種類） */
    .sticker-s1 { background: #ffe0ef; }
    .sticker-s2 { background: #e8e0ff; }
    .sticker-s3 { background: #e0f8ef; }
    .sticker-s4 { background: #fff8e0; }
    .sticker-s5 { background: #ffe8e0; }

    .sticker-label { font-size: 12px; color: #b090a8; margin-top: -4px; }
  </style>
</head>
<body>

  <div class="title">🌸 ひらがなゲーム 🌸</div>
  <div class="subtitle">えをみて、ただしいことばをえらぼう！</div>

  <!-- スコア表示 -->
  <div class="score-bar">
    <div class="score-card">
      <div class="score-label">💖 てん</div>
      <div class="score-value" id="score">0</div>
    </div>
    <div class="score-card">
      <div class="score-label">🌷 もんだい</div>
      <div class="score-value" id="questionNum">0 / 10</div>
    </div>
    <div class="score-card">
      <div class="score-label">✨ れんぞく</div>
      <div class="score-value" id="streak">0</div>
    </div>
  </div>

  <!-- 進捗バー -->
  <div class="progress-bar-wrap">
    <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
  </div>

  <!-- ゲームエリア -->
  <div id="gameArea">
    <div class="card" id="card">
      <div style="font-size:52px;">🌸</div>
      <div style="font-size:18px; color:#c090b0;">スタートをおしてね！</div>
    </div>
    <div class="choices" id="choices" style="display:none;"></div>
    <div class="feedback" id="feedback"></div>
    <div class="stars"    id="stars"></div>
    <button class="start-btn" id="startBtn" onclick="startGame()">🌟 スタート！</button>
  </div>

  <!-- ごほうびシール画面（全問終了後に表示） -->
  <div class="result-screen" id="resultScreen">
    <div class="result-title">🎀 おわったよ！ 🎀</div>
    <div class="result-score" id="resultScore">0てん</div>
    <div class="result-msg"   id="resultMsg"></div>
    <div style="font-size:14px; color:#c080b0; font-weight:500;">🎁 ごほうびシール</div>
    <div class="sticker-area" id="stickerArea"></div>
    <div class="sticker-label" id="stickerLabel"></div>
    <button class="start-btn" onclick="startGame()" style="margin-top:0.5rem;">🔄 もういちど！</button>
  </div>

<script>
  /* ===== 問題データ ===== */
  var words = [
    { emoji:"🦆", word:"あひる",  choices:["あひる","いぬ","ねこ","うさぎ"] },
    { emoji:"🐶", word:"いぬ",    choices:["えび","いぬ","くま","とら"] },
    { emoji:"🐰", word:"うさぎ",  choices:["きつね","かえる","うさぎ","おに"] },
    { emoji:"🦐", word:"えび",    choices:["えび","あひる","ねこ","いぬ"] },
    { emoji:"👹", word:"おに",    choices:["とら","おに","くま","えび"] },
    { emoji:"🐸", word:"かえる",  choices:["うさぎ","きつね","かえる","いぬ"] },
    { emoji:"🦊", word:"きつね",  choices:["きつね","おに","あひる","えび"] },
    { emoji:"🐱", word:"ねこ",    choices:["くま","ねこ","かえる","とら"] },
    { emoji:"🐯", word:"とら",    choices:["いぬ","うさぎ","おに","とら"] },
    { emoji:"🐻", word:"くま",    choices:["くま","きつね","ねこ","えび"] },
    { emoji:"🐢", word:"かめ",    choices:["かめ","ねこ","かえる","とら"] },
    { emoji:"🦌", word:"しか",    choices:["いぬ","うさぎ","しか","とら"] },
    { emoji:"🐘", word:"ぞう",    choices:["くま","ぞう","ねこ","えび"] },
    { emoji:"🦁", word:"らいおん", choices:["らいおん","しか","ぞう","くま"] },
    { emoji:"🐊", word:"わに",    choices:["くま","ぞう","ねこ","わに"] },
  ];

  /* ===== ごほうびシールの種類 ===== */
  var allStickers = [
    { emoji:"🌸", bg:"sticker-s1" },
    { emoji:"🦄", bg:"sticker-s2" },
    { emoji:"🍓", bg:"sticker-s3" },
    { emoji:"⭐", bg:"sticker-s4" },
    { emoji:"🌈", bg:"sticker-s2" },
    { emoji:"🎀", bg:"sticker-s1" },
    { emoji:"🍭", bg:"sticker-s5" },
    { emoji:"🧁", bg:"sticker-s4" },
    { emoji:"🦋", bg:"sticker-s2" },
    { emoji:"💎", bg:"sticker-s1" },
  ];

  /* ===== ゲームの状態を管理する変数 ===== */
  var score         = 0;   // 合計得点
  var streak        = 0;   // 連続正解数
  var questionIndex = 0;   // 今何問目か
  var shuffled      = [];  // シャッフルされた問題リスト
  var answered      = false; // 今の問題に答えたかどうか

  /* 配列をランダムに並び替える */
  function shuffle(arr) {
    return arr.slice().sort(function() { return Math.random() - 0.5; });
  }

  /* ゲームをはじめから始める */
  function startGame() {
    score         = 0;
    streak        = 0;
    questionIndex = 0;
    answered      = false;
    shuffled      = shuffle(words);

    document.getElementById("resultScreen").style.display = "none";
    document.getElementById("gameArea").style.display     = "block";
    document.getElementById("feedback").textContent       = "";
    document.getElementById("stars").textContent          = "";
    document.getElementById("startBtn").style.display     = "none";
    document.getElementById("progressBar").style.width    = "0%";

    updateScore();
    showQuestion();
  }

  /* スコア・問題番号・プログレスバーを更新する */
  function updateScore() {
    document.getElementById("score").textContent       = score;
    document.getElementById("questionNum").textContent = questionIndex + " / 10";
    document.getElementById("streak").textContent      = streak;
    document.getElementById("progressBar").style.width = (questionIndex * 10) + "%";
  }

  /* 次の問題を表示する */
  function showQuestion() {
    if (questionIndex >= 10) { showResult(); return; }

    answered    = false;
    var q       = shuffled[questionIndex];

    // 絵カードを更新
    document.getElementById("card").innerHTML =
      '<div class="emoji">' + q.emoji + '</div>' +
      '<div class="hint">なんていうどうぶつ？</div>';

    // 選択肢ボタンを作る
    var choicesEl   = document.getElementById("choices");
    choicesEl.style.display = "grid";
    choicesEl.innerHTML     = "";
    document.getElementById("feedback").textContent = "";
    document.getElementById("stars").textContent    = "";

    shuffle(q.choices).forEach(function(c) {
      var btn       = document.createElement("button");
      btn.className = "choice-btn";
      btn.textContent = c;
      btn.onclick   = function() { checkAnswer(c, q.word, btn); };
      choicesEl.appendChild(btn);
    });

    updateScore();
  }

  /* 答えを確認する */
  function checkAnswer(selected, correct, btn) {
    if (answered) return; // 2回押し防止
    answered = true;

    var allBtns = document.querySelectorAll(".choice-btn");
    allBtns.forEach(function(b) { b.disabled = true; });

    if (selected === correct) {
      // 正解 → ボーナス点あり（連続正解 × 5点）
      btn.classList.add("correct");
      score  += 10 + (streak * 5);
      streak += 1;
      var fb  = streak >= 3
        ? "🎉 " + streak + "れんぞく！すごい！"
        : "💖 せいかい！";
      document.getElementById("feedback").textContent = fb;
      document.getElementById("stars").textContent    = getStars(streak);
    } else {
      // 不正解 → 正解のボタンも緑にして教える
      btn.classList.add("wrong");
      allBtns.forEach(function(b) {
        if (b.textContent === correct) b.classList.add("correct");
      });
      streak = 0;
      document.getElementById("feedback").textContent = "❌ こたえは「" + correct + "」だよ！";
      document.getElementById("stars").textContent    = "";
    }

    questionIndex += 1;
    updateScore();
    setTimeout(showQuestion, 1600); // 1.6秒後に次の問題へ
  }

  /* 連続正解数に応じて花を返す */
  function getStars(s) {
    if (s >= 5) return "🌸🌸🌸";
    if (s >= 3) return "🌸🌸";
    if (s >= 1) return "🌸";
    return "";
  }

  /* 全問終了後のシール画面を表示する */
  function showResult() {
    document.getElementById("choices").style.display  = "none";
    document.getElementById("gameArea").style.display = "none";

    var rs = document.getElementById("resultScreen");
    rs.style.display = "flex";

    document.getElementById("resultScore").textContent = score + "てん！";
    document.getElementById("progressBar").style.width = "100%";

    // 得点によってシール枚数とメッセージを変える
    var stickerCount, msg;
    if (score >= 130) {
      stickerCount = 10; msg = "🏆 かんぺき！ぜんぶできたね！すごすぎる！";
    } else if (score >= 100) {
      stickerCount = 7;  msg = "🌟 とってもじょうず！シールをいっぱいあげる！";
    } else if (score >= 70) {
      stickerCount = 5;  msg = "💖 よくできました！またちょうせんしてね！";
    } else if (score >= 40) {
      stickerCount = 3;  msg = "🌷 がんばったね！もういちどやってみよう！";
    } else {
      stickerCount = 1;  msg = "🌱 つぎはもっとできるよ！いっしょにがんばろ！";
    }

    document.getElementById("resultMsg").textContent    = msg;
    document.getElementById("stickerLabel").textContent =
      "シールを " + stickerCount + "まい ゲット！";

    // シールを1枚ずつ時間差でアニメーション表示
    var area   = document.getElementById("stickerArea");
    area.innerHTML = "";
    shuffle(allStickers).slice(0, stickerCount).forEach(function(s, i) {
      setTimeout(function() {
        var div       = document.createElement("div");
        div.className = "sticker " + s.bg;
        div.textContent = s.emoji;
        area.appendChild(div);
      }, i * 150); // 150msずつずらして表示
    });
  }
</script>

</body>
</html>
