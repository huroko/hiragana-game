<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ひらがなゲームをやってみよう！</title>
    <style>
        /* デザイン：ゆめかわいいパステル調 */
        :root {
            --pink-bg: #fff0f5;
            --main-pink: #ff69b4;
            --sub-pink: #ffb6c1;
            --white: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--pink-bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* 画面の共通スタイル */
        .screen {
            display: none; /* 初期は非表示 */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- 1. タイトル画面 --- */
        #title-screen {
            display: flex; /* 最初に見せる */
            background-image: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)), url('http://googleusercontent.com/image_collection/image_retrieval/179522968012967515');
            background-size: cover;
        }

        .title-logo {
            font-size: 60px;
            color: var(--main-pink);
            text-shadow: 3px 3px 0 white;
            margin-bottom: 40px;
        }

        .start-btn {
            font-size: 32px;
            padding: 20px 60px;
            background: linear-gradient(#ff92d0, #ff69b4);
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 8px 0 #db4d93;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- 2. クイズ画面 --- */
        #quiz-box {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 8px 20px rgba(255, 182, 193, 0.4);
            border: 4px solid var(--sub-pink);
            width: 350px;
        }

        #progress-bar {
            width: 100%;
            height: 15px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--main-pink);
            transition: width 0.3s;
        }

        #emoji-display { font-size: 100px; margin: 0; }
        
        .choice-btn {
            font-size: 28px; font-weight: bold; color: var(--main-pink);
            background-color: var(--pink-bg); border: 3px solid var(--sub-pink);
            width: 55px; height: 55px; border-radius: 15px; cursor: pointer;
            margin: 5px; box-shadow: 0 4px 0 var(--sub-pink);
        }

        /* --- 3. クリア（ごほうび）画面 --- */
        #clear-screen {
            background-color: white;
        }

        .sticker-container {
            width: 300px;
            height: 300px;
            margin: 20px;
            animation: popIn 0.8s cubic-bezier(0.17, 0.89, 0.32, 1.49);
        }

        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        .sticker-img {
            width: 100%; height: 100%; object-fit: contain;
        }

        .congrats-text {
            font-size: 40px; color: var(--main-pink); font-weight: bold;
        }

        #restart-btn {
            margin-top: 20px; font-size: 20px; color: #666; background: none; border: underline; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="title-screen" class="screen">
        <h1 class="title-logo">ひらがなゲームを<br>やってみよう！</h1>
        <button class="start-btn" onclick="startGame()">はじめる！</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="score-container" style="font-weight:bold; color:var(--main-pink); margin-bottom:10px;">
            あと <span id="remaining">10</span> もんで クリア！
        </div>
        <div id="progress-bar"><div id="progress-fill"></div></div>

        <div id="quiz-box">
            <p id="emoji-display">❓</p>
            <button id="hint-btn" style="background:var(--sub-pink); border:none; border-radius:10px; color:white; padding:5px 15px; margin:10px;" onclick="showHint()">💡 ひんと</button>
            <div id="hint-text" style="height:25px; color:var(--main-pink); font-weight:bold;"></div>
            
            <div id="choices-container">
                </div>
            <button id="next-btn" style="display:none; margin-top:20px; padding:10px 30px; background:var(--main-pink); color:white; border:none; border-radius:20px; font-weight:bold;" onclick="nextQuestion()">つぎへ！</button>
        </div>
    </div>

    <div id="clear-screen" class="screen">
        <div class="congrats-text">10問せいかい！<br>おめでとう！</div>
        <div class="sticker-container">
            <img id="reward-sticker" class="sticker-img" src="" alt="ごほうびシール">
        </div>
        <div style="font-size:24px; color:#555;">ごほうびシールを あげるね！</div>
        <button id="restart-btn" onclick="location.reload()">もういちど あそぶ</button>
    </div>

    <script>
        // データ設定
        const quizData = [
            { emoji: "🍎", word: "りんご", answer: "り" },
            { emoji: "🐱", word: "ねこ", answer: "ね" },
            { emoji: "🚗", word: "くるま", answer: "く" },
            { emoji: "🍦", word: "あいす", answer: "あ" },
            { emoji: "🍓", word: "いちご", answer: "い" },
            { emoji: "🍉", word: "すいか", answer: "す" },
            { emoji: "🎈", word: "ふうせん", answer: "ふ" },
            { emoji: "🍌", word: "ばなな", answer: "ば" },
            { emoji: "🐼", word: "ぱんだ", answer: "ぱ" },
            { emoji: "🦁", word: "らいおん", answer: "ら" }
        ];

        const stickers = [
            'http://googleusercontent.com/image_collection/image_retrieval/14664035387423763527', // うさぎ
            'http://googleusercontent.com/image_collection/image_retrieval/5013779276119358917', // にじ
            'http://googleusercontent.com/image_collection/image_retrieval/10640471539218616802'  // どうぶつ
        ];

        let correctCount = 0;
        let currentQuestion = null;
        const targetCount = 10;

        // 音声設定
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(f1, f2, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(f1, audioCtx.currentTime);
            if(f2) osc.frequency.setValueAtTime(f2, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        // 画面切り替え
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        }

        function startGame() {
            correctCount = 0;
            showScreen('game-screen');
            nextQuestion();
        }

        function nextQuestion() {
            if (correctCount >= targetCount) {
                showClear();
                return;
            }

            document.getElementById("next-btn").style.display = "none";
            document.getElementById("hint-text").innerText = "";
            document.getElementById("hint-btn").style.display = "inline-block";
            
            // 進捗更新
            document.getElementById("remaining").innerText = targetCount - correctCount;
            document.getElementById("progress-fill").style.width = (correctCount / targetCount * 100) + "%";

            // 問題作成
            currentQuestion = quizData[Math.floor(Math.random() * quizData.length)];
            document.getElementById("emoji-display").innerText = currentQuestion.emoji;

            let choices = [currentQuestion.answer];
            while(choices.length < 5) {
                let char = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれわ"[Math.floor(Math.random()*44)];
                if(!choices.includes(char)) choices.push(char);
            }
            choices.sort(() => Math.random() - 0.5);

            const container = document.getElementById("choices-container");
            container.innerHTML = "";
            choices.forEach(c => {
                const btn = document.createElement("button");
                btn.className = "choice-btn";
                btn.innerText = c;
                btn.onclick = () => checkAnswer(btn);
                container.appendChild(btn);
            });
        }

        function showHint() {
            document.getElementById("hint-text").innerText = `「${currentQuestion.answer}」からはじまるよ！`;
            document.getElementById("hint-btn").style.display = "none";
        }

        function checkAnswer(btn) {
            if (btn.innerText === currentQuestion.answer) {
                playSound(523, 659, 0.5); // ピンポーン
                btn.style.background = "#ff69b4"; btn.style.color = "white";
                correctCount++;
                document.getElementById("next-btn").style.display = "inline-block";
                document.getElementById("hint-btn").style.display = "none";
                document.getElementById("hint-text").innerText = `せいかい！「${currentQuestion.word}」だね！`;
                // 全ボタン無効化
                document.querySelectorAll(".choice-btn").forEach(b => b.onclick = null);
            } else {
                playSound(200, null, 0.2); // ブブー
                btn.style.opacity = "0.4";
            }
        }

        function showClear() {
            // ファンファーレ音
            playSound(523, 1046, 1.0);
            // ランダムにシールを選ぶ
            const randomSticker = stickers[Math.floor(Math.random() * stickers.length)];
            document.getElementById("reward-sticker").src = randomSticker;
            showScreen('clear-screen');
        }
    </script>
</body>
</html>
