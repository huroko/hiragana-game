<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ひらがな えもじくいず</title>
    <style>
        /* 女の子向けのゆめかわデザイン */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fff0f5; /* パステルピンク */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        /* スコア表示 */
        #score-container {
            font-size: 24px;
            color: #ff69b4;
            font-weight: bold;
            margin-bottom: 15px;
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* クイズ画面全体を包むカード */
        #quiz-box {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 8px 20px rgba(255, 182, 193, 0.4);
            border: 4px solid #ffb6c1;
            text-align: center;
            width: 320px;
        }

        /* 大きな絵文字お題 */
        #emoji-display {
            font-size: 100px;
            margin: 0;
            line-height: 1.2;
        }

        /* ヒント表示エリア */
        #hint-display {
            font-size: 20px;
            color: #ff1493;
            font-weight: bold;
            height: 30px;
            margin-top: 10px;
        }

        /* ヒントボタン */
        #hint-btn {
            background-color: #ffb6c1;
            color: white;
            border: none;
            padding: 6px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            margin-bottom: 15px;
            box-shadow: 0 3px 0 #db4d93;
        }
        #hint-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #db4d93;
        }

        /* 選択肢のボタンが並ぶエリア */
        #choices-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        /* 5つのひらがなボタン */
        .choice-btn {
            font-size: 28px;
            font-weight: bold;
            color: #ff1493;
            background-color: #fff0f5;
            border: 3px solid #ffb6c1;
            width: 52px;
            height: 52px;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 0 #ffb6c1;
            transition: all 0.1s;
        }
        .choice-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #ffb6c1;
        }

        /* つぎへボタン（正解したときだけ見えるようにする） */
        #next-btn {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background: linear-gradient(to bottom, #ff92d0, #ff69b4);
            border: none;
            padding: 10px 35px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 0 #db4d93;
            display: none; /* 初期状態は非表示 */
        }
        #next-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #db4d93;
        }
    </style>
</head>
<body>

    <div id="score-container">てんすう： <span id="score">0</span> てん</div>

    <div id="quiz-box">
        <p id="emoji-display">❓</p>
        
        <button id="hint-btn" onclick="showHint()">💡 ひんと</button>
        <div id="hint-display"></div>

        <div id="choices-container">
            <button class="choice-btn" onclick="checkAnswer(this)">？</button>
            <button class="choice-btn" onclick="checkAnswer(this)">？</button>
            <button class="choice-btn" onclick="checkAnswer(this)">？</button>
            <button class="choice-btn" onclick="checkAnswer(this)">？</button>
            <button class="choice-btn" onclick="checkAnswer(this)">？</button>
        </div>

        <button id="next-btn" onclick="nextQuestion()">つぎへ ➔</button>
    </div>

    <script>
        // ① 50音クイズデータ（ここに「か行」以降も同じ形式でどんどん追加できます！）
        const quizData = [
            { emoji: "🍎", word: "りんご", answer: "り" },
            { emoji: "🐱", word: "ねこ", answer: "ね" },
            { emoji: "🚗", word: "くるま", answer: "く" },
            { emoji: "🍦", word: "あいす", answer: "あ" },
            { emoji: "🍓", word: "いちご", answer: "い" },
            { emoji: "🍉", word: "すいか", answer: "す" },
            { emoji: "🎈", word: "ふうせん", answer: "ふ" },
            { emoji: "🍌", word: "ばなな", answer: "ば" },
            { emoji: "🐼", word: "ぱんだ", answer: "ぱ" }
        ];

        // ハズレボタンを作るための「全ひらがなリスト」
        const allChars = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれわ";

        let currentQuestion = null;
        let score = 0;
        let isAnswered = false; // 正解済みかどうかのフラグ

        // ② サウンド再生（Web Audio API）
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'correct') {
                // 正解の音「ピンポーン！」（高い2音）
                osc.type = 'sine';
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime); // ミ
                osc.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.15); // ラ
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'wrong') {
                // 不正解の音「ぶぶー」（低い音）
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // ③ クイズの生成
        function makeQuestion() {
            isAnswered = false;
            document.getElementById("next-btn").style.display = "none"; // 次へボタンを隠す
            document.getElementById("hint-display").innerText = ""; // ヒントを消す
            document.getElementById("hint-btn").style.display = "inline-block"; // ヒントボタンを出す

            // ランダムにお題を1つ選ぶ
            currentQuestion = quizData[Math.floor(Math.random() * quizData.length)];
            document.getElementById("emoji-display").innerText = currentQuestion.emoji;

            // 選択肢（5文字）を作る。まずは正解の文字を入れる
            let choices = [currentQuestion.answer];

            // 被らないようにハズレの文字を4つ選ぶ
            while (choices.length < 5) {
                let randomChar = allChars[Math.floor(Math.random() * allChars.length)];
                if (!choices.includes(randomChar)) {
                    choices.push(randomChar);
                }
            }

            // 選択肢の配列をシャッフル（正解が毎回違う位置になるように）
            choices.sort(() => Math.random() - 0.5);

            // ボタンに文字を割り当てる
            const buttons = document.querySelectorAll(".choice-btn");
            buttons.forEach((btn, index) => {
                btn.innerText = choices[index];
                btn.style.backgroundColor = "#fff0f5"; // 色を元に戻す
                btn.style.color = "#ff1493";
                btn.style.opacity = "1";
            } );
        }

        // ④ ヒントを表示する
        function showHint() {
            if (isAnswered) return;
            // 「りからはじまるよ」のように表示
            document.getElementById("hint-display").innerText = `「${currentQuestion.answer}」からはじまるよ`;
            document.getElementById("hint-btn").style.display = "none"; // ボタンは隠す
        }

        // ⑤ 答え合わせ
        function checkAnswer(clickedButton) {
            if (isAnswered) return; // すでに正解してたら何もしない

            if (clickedButton.innerText === currentQuestion.answer) {
                // ★ 正解！
                playSound('correct');
                score += 20; // 20点プラス
                document.getElementById("score").innerText = score;
                isAnswered = true;

                // 正解ボタンをピカピカ（ピンク）にして、他を少し薄くする
                clickedButton.style.backgroundColor = "#ff69b4";
                clickedButton.style.color = "white";
                
                // 次へボタンを表示
                document.getElementById("next-btn").style.display = "inline-block";
                document.getElementById("hint-btn").style.display = "none";
                document.getElementById("hint-display").innerText = `せいかい！「${currentQuestion.word}」だね！`;
            } else {
                // ★ 不正解
                playSound('wrong');
                // 点数は減らさず、間違えたボタンだけ「おてつき」としてグレーにする
                clickedButton.style.opacity = "0.4";
            }
        }

        // ⑥ 次の問題へ
        function nextQuestion() {
            makeQuestion();
        }

        // ゲーム起動
        makeQuestion();
    </script>
</body>
</html>
